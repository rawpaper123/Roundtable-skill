<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="610" viewBox="0 0 1120 610" role="img" aria-labelledby="title desc">
  <title id="title">Roundtable Skill terminal preview</title>
  <desc id="desc">A terminal-style preview showing a user goal, Lingtai expert replies, executor synthesis, and validation.</desc>
  <rect width="1120" height="610" rx="28" fill="#0d1117"/>
  <rect x="24" y="24" width="1072" height="562" rx="22" fill="#111827" stroke="#30363d"/>
  <circle cx="58" cy="56" r="9" fill="#ff5f57"/>
  <circle cx="86" cy="56" r="9" fill="#ffbd2e"/>
  <circle cx="114" cy="56" r="9" fill="#28c840"/>
  <text x="148" y="62" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">roundtable-skill</text>

  <text x="54" y="114" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">$ open roundtable for: make onboarding safer before launch</text>

  <rect x="54" y="148" width="1012" height="84" rx="14" fill="#0b1220" stroke="#2f81f7"/>
  <text x="78" y="182" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Lingtai experts</text>
  <text x="78" y="212" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">product trust · security/privacy · adversarial scope review</text>

  <rect x="54" y="258" width="318" height="112" rx="14" fill="#161b22" stroke="#30363d"/>
  <text x="78" y="292" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Product trust</text>
  <text x="78" y="326" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Must-fix:</text>
  <text x="78" y="354" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">say whether progress is saved.</text>

  <rect x="402" y="258" width="318" height="112" rx="14" fill="#161b22" stroke="#30363d"/>
  <text x="426" y="292" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Security</text>
  <text x="426" y="326" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">No opinion from</text>
  <text x="426" y="354" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">my expert perspective.</text>

  <rect x="748" y="258" width="318" height="112" rx="14" fill="#161b22" stroke="#30363d"/>
  <text x="772" y="292" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Adversarial</text>
  <text x="772" y="326" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Reject analytics:</text>
  <text x="772" y="354" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">scope creep for launch.</text>

  <rect x="54" y="402" width="1012" height="130" rx="14" fill="#0b1220" stroke="#238636"/>
  <text x="78" y="438" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Executor synthesis</text>
  <text x="78" y="472" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Accepted: one copy change · Rejected: analytics · Verify: render empty state</text>
  <text x="78" y="506" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">Rollback: revert one commit</text>

  <text x="54" y="566" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Experts advise. Executor ships. Every serious change ends with validation and rollback.</text>
</svg>
