<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Roundtable Skill demo cast</title>
  <desc id="desc">A terminal-style demo showing a user goal, Lingtai expert review, Executor synthesis, validation, and rollback.</desc>
  <rect width="1280" height="760" rx="32" fill="#080c14"/>
  <rect x="28" y="28" width="1224" height="704" rx="26" fill="#0d1117" stroke="#2f3642" stroke-width="2"/>

  <circle cx="66" cy="64" r="10" fill="#ff5f57"/>
  <circle cx="98" cy="64" r="10" fill="#ffbd2e"/>
  <circle cx="130" cy="64" r="10" fill="#28c840"/>
  <text x="164" y="72" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">roundtable-skill / first run</text>

  <text x="54" y="130" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">$ open roundtable for: decide whether this auth PR is safe to merge</text>
  <text x="54" y="170" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">runtime: Lingtai required  |  executor: current coding terminal  |  waits: bounded</text>

  <rect x="54" y="206" width="368" height="156" rx="18" fill="#101826" stroke="#30363d"/>
  <text x="80" y="246" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Release reliability</text>
  <text x="80" y="286" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">must-fix:</text>
  <text x="80" y="320" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">add invalid-token smoke</text>

  <rect x="456" y="206" width="368" height="156" rx="18" fill="#101826" stroke="#30363d"/>
  <text x="482" y="246" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Security / privacy</text>
  <text x="482" y="286" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">must-fix:</text>
  <text x="482" y="320" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">scan logs for credentials</text>

  <rect x="858" y="206" width="368" height="156" rx="18" fill="#101826" stroke="#30363d"/>
  <text x="884" y="246" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Scope review</text>
  <text x="884" y="286" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">reject:</text>
  <text x="884" y="320" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">login UI cleanup</text>

  <path d="M238 382 V420" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
  <path d="M640 382 V420" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
  <path d="M1042 382 V420" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>

  <rect x="54" y="420" width="1172" height="168" rx="18" fill="#0b1220" stroke="#238636" stroke-width="2"/>
  <text x="80" y="464" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">Executor synthesis</text>
  <text x="80" y="506" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">accepted: invalid-token smoke, credential log scan</text>
  <text x="80" y="540" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">rejected: login redesign, analytics refactor, new abstraction</text>
  <text x="80" y="574" fill="#f0f6fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">diff: one smoke check, one log-safety check, no package changes</text>

  <rect x="54" y="620" width="356" height="72" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="82" y="665" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21">validation: pass</text>

  <rect x="462" y="620" width="356" height="72" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="490" y="665" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21">git state: clean</text>

  <rect x="870" y="620" width="356" height="72" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="898" y="665" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21">rollback: git revert</text>

  <text x="54" y="720" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Lingtai experts advise. The Executor decides, verifies, reports, and owns rollback.</text>
</svg>
